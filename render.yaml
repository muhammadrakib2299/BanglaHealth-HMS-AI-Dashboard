databases:
  - name: banglahealth-db
    plan: free
    databaseName: banglahealth_db
    user: banglahealth

services:
  # Backend API
  - type: web
    name: banglahealth-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banglahealth-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: banglahealth-frontend
          type: web
          property: host
      - key: ENVIRONMENT
        value: production
      - key: SEED_DATA
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.11"

  # Frontend
  - type: web
    name: banglahealth-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: banglahealth-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "20.11.0"
      - key: NEXT_OUTPUT_MODE
        value: "standalone"
