services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banglahealth
      POSTGRES_PASSWORD: ${DB_PASSWORD:-banglahealth_secret}
      POSTGRES_DB: banglahealth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banglahealth -d banglahealth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://banglahealth:${DB_PASSWORD:-banglahealth_secret}@db:5432/banglahealth_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}

volumes:
  postgres_data:
